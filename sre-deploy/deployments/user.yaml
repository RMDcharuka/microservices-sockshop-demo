apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: weaveworksdemos/user:0.4.7
        ports:
        - containerPort: 80
        env:
        - name: MONGO_URL
          valueFrom:
            configMapKeyRef:
              name: service-config
              key: USERS_MONGO_URL
