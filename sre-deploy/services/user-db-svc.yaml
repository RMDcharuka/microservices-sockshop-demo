apiVersion: v1
kind: Service
metadata:
  name: user-db-svc
  namespace: sock-shop
spec:
  selector:
    name: user-db
  ports:
    - protocol: TCP
      port: 27017       # Service port that other pods will use
      targetPort: 27017 # Port on the user-db container
  type: ClusterIP       # Internal service only
