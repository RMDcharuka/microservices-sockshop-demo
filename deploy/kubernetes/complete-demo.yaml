---
apiVersion: v1
kind: Namespace
metadata:
  name: sock-shop

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: weaveworksdemos/user:0.4.7
        ports:
        - containerPort: 80
        env:
        - name: mongo
          value: "MONGO_CONNECTION_STRING"
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: sock-shop
spec:
  selector:
    app: user
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: weaveworksdemos/orders:0.4.7
        ports:
        - containerPort: 80
        env:
        - name: MONGO_HOST
          value: "COSMOS_MONGO_HOST"
        - name: MONGO_PORT
          value: "10255"
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: sock-shop
spec:
  selector:
    app: orders
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      containers:
      - name: catalogue
        image: weaveworksdemos/catalogue:0.3.5
        ports:
        - containerPort: 80
        env:
        - name: MYSQL_HOST
          value: "MYSQL_HOST"
        - name: MYSQL_USER
          value: "MYSQL_USER"
        - name: MYSQL_PASSWORD
          value: "MYSQL_PASSWORD"
        - name: MYSQL_DATABASE
          value: "catalogue"
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: sock-shop
spec:
  selector:
    app: catalogue
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
    spec:
      containers:
      - name: front-end
        image: weaveworksdemos/front-end:0.3.12
        ports:
        - containerPort: 8079
---
apiVersion: v1
kind: Service
metadata:
  name: front-end
  namespace: sock-shop
spec:
  type: LoadBalancer
  selector:
    app: front-end
  ports:
  - port: 80
    targetPort: 8079
